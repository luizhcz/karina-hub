services:

  # ── Infraestrutura ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-efs_ai_hub}
      POSTGRES_USER: ${POSTGRES_USER:-efs_ai_hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # max_connections=500 acomoda load tests 500-1000 VUs (pools somam 380: general=350
    # + sse=10 + reporting=20, com folga pra superuser/admin queries). Antes default=100
    # estourava com 30 streams SSE sob PostgresException 53300 "too many clients".
    command:
      - postgres
      - -c
      - max_connections=500
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-efs_ai_hub} -d ${POSTGRES_DB:-efs_ai_hub}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Backend API ──────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./src
      dockerfile: Dockerfile.backend
    ports:
      - "5189:5189"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5189
      ASPNETCORE_HTTP_PORTS: ""

      # PostgreSQL — uma linha só para evitar problemas de parsing YAML
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-efs_ai_hub};Username=${POSTGRES_USER:-efs_ai_hub};Password=${POSTGRES_PASSWORD};Search Path=aihub"

      # Redis
      Redis__ConnectionString: redis:6379

      # CORS — permite o frontend via browser (origin = localhost:3000)
      Cors__AllowedOrigins__0: http://localhost:3000

      # Azure AI Foundry
      AzureAI__Endpoint: ${AZURE_AI_ENDPOINT:-https://efs-ai-hub-resource.services.ai.azure.com}
      AzureAI__ApiKey: ${AZURE_AI_API_KEY:-}
      AzureAI__DefaultDeploymentName: ${AZURE_AI_DEFAULT_DEPLOYMENT:-gpt-4o}

      # OpenAI
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__DefaultModel: ${OPENAI_DEFAULT_MODEL:-gpt-4o}

      # Document Intelligence
      DocumentIntelligence__Endpoint: ${DOCUMENT_INTELLIGENCE_ENDPOINT:-https://efs-ai-hub-resource.cognitiveservices.azure.com}
      DocumentIntelligence__ApiKey: ${DOCUMENT_INTELLIGENCE_API_KEY:-}
      DocumentIntelligence__UseManagedIdentity: "false"

      # OpenTelemetry (desabilitado por padrão no compose — sem collector)
      OpenTelemetry__OtlpEndpoint: ""

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: http://backend:5189
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
